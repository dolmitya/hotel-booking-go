app:
  name: hotel-booking
  env: docker
  http:
    host: 0.0.0.0
    port: 8080

postgres:
  host: postgres
  port: 5432
  database: booking
  username: booking
  password: booking
  ssl_mode: disable

kafka:
  bootstrap_servers:
    - kafka:29092
  topics:
    guest_events: guest-events
    booking_events: booking-events
    room_events: room-events
